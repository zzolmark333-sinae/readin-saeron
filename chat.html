<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https://*.workers.dev https://*.pages.dev">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>독서 AI 비서 · 새론에듀</title>
<style>
  :root {
    --paper:#efe9db; --paper-raised:#f6f1e6; --ink:#262319; --ink-soft:#55503f;
    --celadon:#3f5b4e; --celadon-deep:#2b4038; --persimmon:#ad502c; --line:#d9d0b8;
    --line-strong:#c4b89a; --brand-orange:#f39200; color-scheme:light;
  }
  @media (prefers-color-scheme: dark){ :root{
    --paper:#1b1912; --paper-raised:#24211a; --ink:#ece5d4; --ink-soft:#b3ab94;
    --celadon:#86a894; --celadon-deep:#a9c4b3; --persimmon:#d98253; --line:#3a3527;
    --line-strong:#4b4530; --brand-orange:#f39200; color-scheme:dark; }}
  :root[data-theme="dark"]{
    --paper:#1b1912; --paper-raised:#24211a; --ink:#ece5d4; --ink-soft:#b3ab94;
    --celadon:#86a894; --celadon-deep:#a9c4b3; --persimmon:#d98253; --line:#3a3527;
    --line-strong:#4b4530; color-scheme:dark; }
  :root[data-theme="light"]{
    --paper:#efe9db; --paper-raised:#f6f1e6; --ink:#262319; --ink-soft:#55503f;
    --celadon:#3f5b4e; --celadon-deep:#2b4038; --persimmon:#ad502c; --line:#d9d0b8;
    --line-strong:#c4b89a; color-scheme:light; }

  * { box-sizing:border-box; }
  html, body { height:100%; }
  body {
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    display:flex; flex-direction:column; min-height:100dvh;
  }
  a { color:inherit; }
  .serif { font-family:"Noto Serif KR","Nanum Myeongjo","Batang",serif; }

  header.bar {
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px clamp(16px,4vw,28px); border-bottom:1px solid var(--line);
    background:color-mix(in srgb, var(--paper) 90%, transparent); position:sticky; top:0; z-index:5;
  }
  .brand { display:flex; flex-direction:column; gap:2px; line-height:1.15; }
  .brand .w { font-family:"Noto Serif KR","Nanum Myeongjo",serif; font-size:19px; font-weight:800; }
  .brand .w .edu { color:var(--brand-orange); }
  .brand .sub { font-size:11.5px; color:var(--ink-soft); }
  .back { font-size:13px; color:var(--celadon-deep); text-decoration:none; font-weight:600; white-space:nowrap; }

  .usage { padding:8px clamp(16px,4vw,28px) 0; }
  .usage-row { display:flex; align-items:center; justify-content:space-between; font-size:11px; color:var(--ink-soft); margin-bottom:4px; }
  .usage-bar { height:5px; border-radius:3px; background:var(--line); overflow:hidden; }
  .usage-fill { height:100%; width:0; background:var(--celadon); border-radius:3px; transition:width .4s ease, background .3s ease; }
  .usage-fill.warn { background:var(--brand-orange); }
  .usage-fill.stop { background:var(--persimmon); }

  main.chat {
    flex:1; overflow-y:auto; padding:18px clamp(16px,4vw,28px);
    display:flex; flex-direction:column; gap:14px; max-width:820px; width:100%; margin:0 auto;
  }
  .intro {
    background:var(--paper-raised); border:1px solid var(--line); border-radius:14px;
    padding:16px 18px; font-size:14px; color:var(--ink-soft); line-height:1.65;
  }
  .intro b { color:var(--ink); }
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .chip {
    font-size:12.5px; padding:7px 13px; border-radius:999px; cursor:pointer;
    background:var(--paper); border:1px solid var(--line-strong); color:var(--ink);
  }
  .chip:hover { border-color:var(--celadon); }

  .msg { display:flex; gap:10px; max-width:100%; }
  .msg .bubble {
    padding:12px 15px; border-radius:14px; font-size:14.5px; line-height:1.7; white-space:pre-wrap; word-break:break-word;
  }
  .msg.user { justify-content:flex-end; }
  .msg.user .bubble { background:var(--celadon-deep); color:var(--paper-raised); border-bottom-right-radius:4px; max-width:78%; }
  .msg.ai .bubble { background:var(--paper-raised); border:1px solid var(--line); border-bottom-left-radius:4px; max-width:88%; }
  .msg.ai .who { font-size:11px; color:var(--persimmon); font-weight:700; margin-bottom:4px; }
  .typing span { display:inline-block; width:6px; height:6px; margin:0 1px; border-radius:50%; background:var(--ink-soft); animation:blink 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay:.2s; } .typing span:nth-child(3){ animation-delay:.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2;} 40%{opacity:1;} }

  footer.compose {
    border-top:1px solid var(--line); background:var(--paper);
    padding:12px clamp(16px,4vw,28px); position:sticky; bottom:0;
  }
  .compose-inner { max-width:820px; margin:0 auto; display:flex; gap:10px; align-items:flex-end; }
  textarea#input {
    flex:1; resize:none; border:1px solid var(--line-strong); border-radius:12px;
    padding:12px 14px; font-family:inherit; font-size:14.5px; background:var(--paper-raised);
    color:var(--ink); min-height:48px; max-height:140px; line-height:1.5;
  }
  textarea#input:focus { outline:2px solid var(--celadon); outline-offset:0; }
  button#send {
    flex-shrink:0; border:none; border-radius:12px; padding:0 20px; height:48px;
    background:var(--brand-orange); color:#3a2410; font-weight:800; font-size:15px;
    font-family:inherit; cursor:pointer;
  }
  button#send:disabled { opacity:.5; cursor:default; }
  .disclaimer { max-width:820px; margin:8px auto 0; font-size:11px; color:var(--ink-soft); text-align:center; }

  /* paused overlay */
  .paused {
    position:fixed; inset:0; z-index:20; display:none;
    align-items:center; justify-content:center; padding:24px;
    background:color-mix(in srgb, var(--celadon-deep) 80%, transparent); backdrop-filter:blur(3px);
  }
  .paused.show { display:flex; }
  .paused-card {
    background:var(--paper); border-radius:18px; padding:30px 28px; text-align:center;
    max-width:360px; width:100%; box-shadow:0 20px 50px rgba(0,0,0,.3);
  }
  .paused-card .spin {
    width:38px; height:38px; margin:0 auto 16px; border-radius:50%;
    border:3px solid var(--line); border-top-color:var(--celadon); animation:spin 1s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .paused-card h2 { font-family:"Noto Serif KR","Nanum Myeongjo",serif; font-size:20px; margin:0 0 8px; }
  .paused-card p { font-size:13.5px; color:var(--ink-soft); margin:0 0 16px; line-height:1.6; }
  .paused-card .count { font-size:30px; font-weight:800; color:var(--celadon-deep); font-variant-numeric:tabular-nums; }
  .paused-card .count small { display:block; font-size:12px; color:var(--ink-soft); font-weight:500; margin-top:4px; }

  .notice { font-size:12.5px; color:var(--persimmon); text-align:center; padding:6px; }
  @media (prefers-reduced-motion: reduce){ .spin, .typing span { animation:none !important; } }
</style>
</head>
<body>
  <header class="bar">
    <div class="brand">
      <span class="w">새론<span class="edu">에듀</span></span>
      <span class="sub">독서 AI 비서</span>
    </div>
    <a class="back" href="index.html">← 홈으로</a>
  </header>

  <div class="usage" aria-hidden="true">
    <div class="usage-row"><span>오늘의 사용량</span><span id="usageText">0%</span></div>
    <div class="usage-bar"><div class="usage-fill" id="usageFill"></div></div>
  </div>

  <main class="chat" id="chat">
    <div class="intro">
      <b>자녀의 독서, 무엇이든 편하게 물어보세요.</b><br>
      책을 안 읽는 아이, 어떤 책을 골라야 할지, 독후활동은 어떻게 할지 — 새론에듀 독서 AI 비서가 도와드립니다.
      <div class="chips" id="chips">
        <span class="chip">아이가 책을 안 읽어요</span>
        <span class="chip">우리 아이 나이에 맞는 책 추천</span>
        <span class="chip">독후활동 어떻게 시켜요?</span>
        <span class="chip">글쓰기를 싫어해요</span>
      </div>
    </div>
  </main>

  <footer class="compose">
    <div class="compose-inner">
      <textarea id="input" placeholder="메시지를 입력하세요… (Enter 전송, Shift+Enter 줄바꿈)" rows="1"></textarea>
      <button id="send">전송</button>
    </div>
    <p class="disclaimer" id="disclaimer">AI의 답변은 참고용입니다. 정확한 진단·상담은 ☎ 010-8999-8829 로 문의해 주세요.</p>
  </footer>

  <div class="paused" id="paused">
    <div class="paused-card">
      <div class="spin"></div>
      <h2>잠시만 기다려주세요…</h2>
      <p>오늘 사용량이 가득 찼어요.<br>잠시 후 다시 이용하실 수 있습니다.</p>
      <div class="count"><span id="countdown">00:00:00</span><small>남은 시간</small></div>
    </div>
  </div>

<script>
(function () {
  // ===== 설정 =====
  var BACKEND_URL = "";                 // ← Cloudflare Worker 주소를 여기에 넣으면 작동합니다
  var TOKEN_BUDGET = 200000;            // 하루 토큰 예산 (원하는 만큼 조정)
  var PAUSE_AT = 0.92;                  // 92% 사용 시 자동 종료
  var WINDOW_MS = 24 * 60 * 60 * 1000;  // 사용량이 초기화되는 주기(24시간)
  var SYSTEM_HINT = "너는 학부모의 자녀 독서를 책임질 AI 비서이다"; // 참고용(실제 적용은 프록시에서)

  var chat = document.getElementById('chat');
  var input = document.getElementById('input');
  var sendBtn = document.getElementById('send');
  var pausedEl = document.getElementById('paused');
  var countdownEl = document.getElementById('countdown');
  var usageFill = document.getElementById('usageFill');
  var usageText = document.getElementById('usageText');
  var disclaimer = document.getElementById('disclaimer');
  var history = [];  // {role, content}
  var busy = false;
  var pauseTimer = null;

  // ===== 사용량 상태 (localStorage) =====
  function loadState() {
    var s;
    try { s = JSON.parse(localStorage.getItem('saeron_ai_usage') || '{}'); } catch (e) { s = {}; }
    if (!s.windowStart || (Date.now() - s.windowStart) > WINDOW_MS) {
      s = { used: 0, windowStart: Date.now() };
      saveState(s);
    }
    return s;
  }
  function saveState(s) { try { localStorage.setItem('saeron_ai_usage', JSON.stringify(s)); } catch (e) {} }
  function addUsage(tokens) { var s = loadState(); s.used += (tokens || 0); saveState(s); refreshUsage(); }
  function refreshUsage() {
    var s = loadState();
    var pct = Math.min(100, Math.round(s.used / TOKEN_BUDGET * 100));
    usageText.textContent = pct + '%';
    usageFill.style.width = pct + '%';
    usageFill.className = 'usage-fill' + (pct >= 92 ? ' stop' : (pct >= 75 ? ' warn' : ''));
  }
  function isPaused() { var s = loadState(); return s.used >= TOKEN_BUDGET * PAUSE_AT; }
  function resetAt() { return loadState().windowStart + WINDOW_MS; }

  // ===== 일시정지 화면 + 카운트다운 =====
  function fmt(ms) {
    if (ms < 0) ms = 0;
    var t = Math.floor(ms / 1000);
    var h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
    function p(n){ return (n < 10 ? '0' : '') + n; }
    return p(h) + ':' + p(m) + ':' + p(s);
  }
  function enterPaused() {
    pausedEl.classList.add('show');
    input.disabled = true; sendBtn.disabled = true;
    tickCountdown();
  }
  function tickCountdown() {
    if (pauseTimer) clearInterval(pauseTimer);
    function upd() {
      var remain = resetAt() - Date.now();
      countdownEl.textContent = fmt(remain);
      if (remain <= 0) { clearInterval(pauseTimer); exitPaused(); }
    }
    upd();
    pauseTimer = setInterval(upd, 1000);
  }
  function exitPaused() {
    var s = { used: 0, windowStart: Date.now() }; saveState(s); refreshUsage();
    pausedEl.classList.remove('show');
    input.disabled = false; sendBtn.disabled = false;
  }

  // ===== 메시지 렌더 =====
  function addMsg(role, text) {
    var wrap = document.createElement('div');
    wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'ai') {
      var who = document.createElement('div'); who.className = 'who'; who.textContent = '독서 AI 비서';
      bubble.appendChild(who);
    }
    var span = document.createElement('span'); span.textContent = text;
    bubble.appendChild(span);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return span;
  }
  function addTyping() {
    var wrap = document.createElement('div'); wrap.className = 'msg ai'; wrap.id = 'typing';
    wrap.innerHTML = '<div class="bubble"><div class="who">독서 AI 비서</div><span class="typing"><span></span><span></span><span></span></span></div>';
    chat.appendChild(wrap); chat.scrollTop = chat.scrollHeight;
  }
  function removeTyping() { var t = document.getElementById('typing'); if (t) t.remove(); }

  // ===== 전송 =====
  function send(text) {
    text = (text || input.value).trim();
    if (!text || busy) return;
    if (isPaused()) { enterPaused(); return; }

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    input.value = ''; input.style.height = 'auto';
    busy = true; sendBtn.disabled = true;

    if (!BACKEND_URL) {
      removeTyping();
      addMsg('ai', '⚙️ 아직 AI 서버가 연결되지 않았어요. (관리자: Cloudflare Worker 주소를 chat.html의 BACKEND_URL에 넣어 주세요.) 그동안 궁금한 점은 ☎ 010-8999-8829 로 문의해 주세요.');
      busy = false; sendBtn.disabled = false;
      return;
    }

    addTyping();
    fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history.slice(-12) })
    }).then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(function (data) {
      removeTyping();
      var reply = (data && data.reply) ? data.reply : '죄송해요, 답변을 불러오지 못했어요. 잠시 후 다시 시도해 주세요.';
      addMsg('ai', reply);
      history.push({ role: 'assistant', content: reply });
      var used = (data && data.usage && data.usage.total_tokens) ? data.usage.total_tokens : Math.ceil((text.length + reply.length) / 2);
      addUsage(used);
      if (isPaused()) enterPaused();
    }).catch(function () {
      removeTyping();
      addMsg('ai', '⚠️ 연결에 문제가 있어요. 잠시 후 다시 시도하거나 ☎ 010-8999-8829 로 문의해 주세요.');
    }).finally(function () {
      busy = false; sendBtn.disabled = false;
    });
  }

  // ===== 이벤트 =====
  sendBtn.addEventListener('click', function () { send(); });
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', function () {
    input.style.height = 'auto'; input.style.height = Math.min(140, input.scrollHeight) + 'px';
  });
  document.getElementById('chips').addEventListener('click', function (e) {
    if (e.target.classList.contains('chip')) send(e.target.textContent);
  });

  refreshUsage();
  if (isPaused()) enterPaused();
})();
</script>
</body>
</html>
